<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSD 340 Web Development with HTML and CSS</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #1d2671, #c33764);
      color:#fff;
    }

    .card{
      width: min(900px, 92vw);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      padding: 26px 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      text-align:center;
    }

    h1{
      margin: 0 0 8px 0;
      font-size: 28px;
      letter-spacing: 0.5px;
    }

    .subtitle{
      margin: 0 0 18px 0;
      opacity: 0.95;
      line-height: 1.4;
    }

    .image-wrap{
      margin: 18px auto 12px auto;
      width: min(700px, 90%);
      border-radius: 16px;
      overflow:hidden;
      border: 4px solid rgba(255,255,255,0.35);
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
      transform: translateZ(0);
    }

    img{
      width:100%;
      display:block;
      cursor:pointer;
      transition: transform .18s ease, filter .18s ease;
    }

    img:hover{
      transform: scale(1.01);
      filter: saturate(1.15);
    }

    #message{
      margin-top: 14px;
      font-size: 18px;
      font-weight: 600;
    }

    .hint{
      margin-top: 6px;
      font-size: 14px;
      opacity: 0.9;
    }

    .controls{
      margin-top: 16px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      border:none;
      padding: 10px 14px;
      border-radius: 12px;
      cursor:pointer;
      font-weight:700;
      letter-spacing: 0.2px;
      color:#1d2671;
      background: #ffffff;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:hover{
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .badge{
      display:inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.25);
      font-size: 13px;
      opacity: 0.95;
    }
  </style>

  <script>
    // A small set of themed "scenes"
    const scenes = [
      { label: "Mountain Vibes", id: 1018 },
      { label: "City Lights", id: 1011 },
      { label: "Forest Path", id: 1043 },
      { label: "Ocean Mood", id: 1016 },
      { label: "Desert Sunset", id: 1002 }
    ];

    let currentIndex = 0;

    function setScene(index){
      const image = document.getElementById("mainImage");
      const message = document.getElementById("message");
      const badge = document.getElementById("badge");

      currentIndex = index;

      // This timestamp forces a new request so it ALWAYS changes on click
      const bustCache = Date.now();

      // Picsum uses id-based images (stable) + cache-bust so click always updates
      image.src = `https://picsum.photos/id/${scenes[currentIndex].id}/900/520?cb=${bustCache}`;

      message.textContent = `Scene Loaded: ${scenes[currentIndex].label}`;
      badge.textContent = `Scene ${currentIndex + 1} of ${scenes.length}`;
    }

    function nextScene(){
      const next = (currentIndex + 1) % scenes.length;
      setScene(next);
    }

    function randomScene(){
      let r = Math.floor(Math.random() * scenes.length);
      if (r === currentIndex) r = (r + 1) % scenes.length;
      setScene(r);
    }

    // Load the first scene when the page opens
    window.onload = function(){
      setScene(0);
    };
  </script>
</head>

<body>
  <div class="card">
    <h1>Assignment 10.3: JavaScript – Part 2</h1>
    <p class="subtitle">
      Click the image to change the display using an <strong>onclick</strong> event.
    </p>

    <div class="image-wrap">
      <img id="mainImage" alt="Scene Image" onclick="nextScene()" />
    </div>

    <div id="message">Click the image to change it!</div>
    <div class="hint">Tip: Each click loads a new “scene” and updates the text below.</div>

    <div class="controls">
      <button onclick="nextScene()">Next Scene</button>
      <button onclick="randomScene()">Random Scene</button>
    </div>

    <div id="badge" class="badge">Scene 1 of 5</div>
  </div>
</body>
</html>
