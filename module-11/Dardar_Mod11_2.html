<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="Assignment 11.2 JavaScript - Part 3" />
  <meta name="author" content="Jordan Dardar" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dardar_Mod11_2</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef3f8;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #1f4e79;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #444;
      line-height: 1.5;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .add-btn {
      background-color: #28a745;
    }

    .delete-btn {
      background-color: #dc3545;
    }

    .select-delete-btn {
      background-color: #0d6efd;
    }

    .sort-btn {
      background-color: #1f78d1;
    }

    .list-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #f8f9fa;
      border: 1px solid #ddd;
      border-radius: 6px;
      min-height: 120px;
    }

    ol {
      padding-left: 20px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #1f78d1;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Assignment 11.2: JavaScript - Part 3</h1>

    <p>
      Enter a task below and click Add to add it to the list.
      Click Delete Last Entry to remove the last item.
      Click Delete Selected Item to remove a chosen item from the dropdown.
      Click Sort to sort the items in the list.
    </p>

    <input type="text" id="taskInput" placeholder="Enter a task" />

    <select id="deleteSelect">
      <option value="">-- Select item to delete --</option>
    </select>

    <div class="button-row">
      <button class="add-btn" onclick="addTask()">Add</button>
      <button class="delete-btn" onclick="deleteLastTask()">Delete Last Entry</button>
      <button class="select-delete-btn" onclick="deleteSelectedTask()">Delete Selected Item</button>
      <button class="sort-btn" onclick="sortTasks()">Sort</button>
    </div>

    <div class="list-box">
      <strong>Task List:</strong>
      <div id="taskDisplay"></div>
    </div>

    <a href="index.html">Back to Module 11 Landing Page</a>
  </div>

  <script src="Dardar_Mod11_2.js"></script>
</body>
</html>
